<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Terminal</title>
  <link rel="stylesheet" href="/terminal/lib/xterm.min.css">
  <script src="/terminal/lib/xterm.min.js"></script>
  <script src="/terminal/lib/addon-fit.min.js"></script>
  <script src="/terminal/lib/addon-unicode11.min.js"></script>
  <style>
    :root {
      --terminal-bg: #1B1A17;
      --terminal-fg: #DBD6C8;
      --terminal-cursor: #94A687;
      --terminal-cursor-accent: #1B1A17;
      --terminal-selection: rgba(148, 166, 135, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--terminal-bg);
      color: var(--terminal-fg);
    }

    #terminal {
      width: 100%;
      height: 100%;
      background: var(--terminal-bg);
    }

    /* Hide xterm scrollbar - touch scroll handles scrollback */
    .xterm-viewport {
      scrollbar-width: none;
    }

    .xterm-viewport::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('sessionId');
    var token = params.get('token');
    var theme = params.get('theme') || 'dark';
    var parsedFontSize = Number.parseInt(params.get('fontSize') || '10', 10);
    var fontSize = Number.isFinite(parsedFontSize) ? parsedFontSize : 10;
    var reconnectAttempt = 0;
    var reconnectTimer = null;
    var reconnectDelay = 1000;
    var reconnectLimit = 20;
    var maxReconnectDelay = 30000;
    var manualReconnectAvailable = false;
    var themes = {
      dark: {
        background: '#1B1A17',
        foreground: '#DBD6C8',
        cursor: '#94A687',
        cursorAccent: '#1B1A17',
        selectionBackground: 'rgba(148, 166, 135, 0.25)',
        // ANSI — Zen moss-green palette
        black:         '#1B1A17',
        red:           '#C46A6A',
        green:         '#94A687',
        yellow:        '#D4B86A',
        blue:          '#8EB0C4',
        magenta:       '#b585b8',
        cyan:          '#6fb5b5',
        white:         '#c8c3b8',
        brightBlack:   '#6D6860',
        brightRed:     '#D48080',
        brightGreen:   '#A5B59A',
        brightYellow:  '#E0C87E',
        brightBlue:    '#A0C0D4',
        brightMagenta: '#cda0d0',
        brightCyan:    '#88cccc',
        brightWhite:   '#F5F2EB',
      },
      light: {
        background: '#F5F4F0',
        foreground: '#2A2721',
        cursor: '#7B8B6F',
        cursorAccent: '#F5F4F0',
        selectionBackground: 'rgba(123, 139, 111, 0.18)',
        // ANSI — Zen muted tones
        black:         '#2A2721',
        red:           '#B25A5A',
        green:         '#7B8B6F',
        yellow:        '#B89F56',
        blue:          '#7A96A8',
        magenta:       '#8a5a8d',
        cyan:          '#4a8a8a',
        white:         '#A09C94',
        brightBlack:   '#66614F',
        brightRed:     '#B25A5A',
        brightGreen:   '#7B8B6F',
        brightYellow:  '#B89F56',
        brightBlue:    '#7A96A8',
        brightMagenta: '#9b6b9e',
        brightCyan:    '#5a9e9e',
        brightWhite:   '#857f77',
      },
    };
    var activeTheme = theme === 'light' ? themes.light : themes.dark;

    function syncThemeVariables(nextTheme) {
      var rootStyle = document.documentElement.style;
      rootStyle.setProperty('--terminal-bg', nextTheme.background);
      rootStyle.setProperty('--terminal-fg', nextTheme.foreground);
      rootStyle.setProperty('--terminal-cursor', nextTheme.cursor);
      rootStyle.setProperty('--terminal-cursor-accent', nextTheme.cursorAccent);
      rootStyle.setProperty('--terminal-selection', nextTheme.selection);
      document.body.style.background = nextTheme.background;
      document.body.style.color = nextTheme.foreground;
    }

    function resolveTheme(nextTheme) {
      if (typeof nextTheme === 'string') {
        return themes[nextTheme] || themes.dark;
      }

      return nextTheme || themes.dark;
    }

    function applyTheme(nextTheme) {
      activeTheme = resolveTheme(nextTheme);
      syncThemeVariables(activeTheme);

      if (term) {
        term.options.theme = activeTheme;
      }
    }

    syncThemeVariables(activeTheme);

    var term = new Terminal({
      allowProposedApi: true,
      fontFamily: '"Noto Sans Mono CJK JP", "Noto Sans Mono", "DejaVu Sans Mono", monospace',
      fontSize: fontSize,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      theme: activeTheme
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    var unicode11 = new Unicode11Addon.Unicode11Addon();
    term.loadAddon(unicode11);
    term.unicode.activeVersion = '11';

    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    var ws = null;
    var lastKnownSize = { cols: term.cols, rows: term.rows };

    function notifyRN(message) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify(message));
      }
    }

    function clearReconnectTimer() {
      if (reconnectTimer !== null) {
        window.clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
    }

    function updateKnownSize() {
      lastKnownSize = { cols: term.cols, rows: term.rows };
    }

    function centerTerminal() {
      var xtermScreen = document.querySelector('.xterm-screen');
      var container = document.getElementById('terminal');
      if (!xtermScreen || !container) return;
      var containerWidth = container.clientWidth;
      var screenWidth = xtermScreen.clientWidth;
      var remainder = containerWidth - screenWidth;
      if (remainder > 1) {
        var pad = Math.floor(remainder / 2);
        container.style.paddingLeft = pad + 'px';
        container.style.paddingRight = (remainder - pad) + 'px';
      } else {
        container.style.paddingLeft = '';
        container.style.paddingRight = '';
      }
    }

    function fitTerminal() {
      var container = document.getElementById('terminal');
      if (container) {
        container.style.paddingLeft = '';
        container.style.paddingRight = '';
      }
      fitAddon.fit();
      updateKnownSize();
      centerTerminal();
    }

    function sendResize() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        return;
      }

      ws.send(JSON.stringify({ type: 'resize', cols: lastKnownSize.cols, rows: lastKnownSize.rows }));
    }

    function writeStatusLine(title, detail) {
      var lines = [''];
      lines.push('> ' + title);
      if (detail) {
        lines.push('  ' + detail);
      }
      lines.push('');

      term.write(lines.join('\r\n'));
    }

    function buildWsUrl() {
      var wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      var wsParams = new URLSearchParams();
      if (sessionId) wsParams.set('sessionId', sessionId);
      if (token) wsParams.set('token', token);
      return wsProtocol + '//' + window.location.host + '/ws/terminal?' + wsParams.toString();
    }

    function scheduleReconnect() {
      if (reconnectAttempt >= reconnectLimit) {
        manualReconnectAvailable = true;
        writeStatusLine('接続が切れました', '画面をタップすると再接続できます。');
        notifyRN({ type: 'reconnectFailed' });
        notifyRN({ type: 'disconnected' });
        return;
      }

      reconnectAttempt += 1;
      var attempt = reconnectAttempt;
      var delay = reconnectDelay;
      reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
      manualReconnectAvailable = false;
      writeStatusLine(
        '再接続しています',
        attempt + '/' + reconnectLimit + ' 回目を ' + (delay / 1000).toFixed(1) + ' 秒後に開始します。',
      );
      notifyRN({ type: 'reconnecting', attempt: attempt });
      clearReconnectTimer();
      reconnectTimer = window.setTimeout(function() {
        connect();
      }, delay);
    }

    function resetReconnectState() {
      reconnectAttempt = 0;
      reconnectDelay = 1000;
      manualReconnectAvailable = false;
      clearReconnectTimer();
    }

    function connect() {
      clearReconnectTimer();

      if (!token) {
        notifyRN({ type: 'error', message: 'Missing token' });
        writeStatusLine('認証トークンが見つかりません');
        return;
      }

      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        return;
      }

      try {
        ws = new WebSocket(buildWsUrl());
      } catch (e) {
        var errorMessage = 'WebSocket creation failed: ' + e.message;
        writeStatusLine('接続の準備に失敗しました', errorMessage);
        notifyRN({ type: 'error', message: errorMessage });
        scheduleReconnect();
        return;
      }

      ws.onopen = function() {
        resetReconnectState();
        term.reset();
        fitTerminal();
        notifyRN({ type: 'connected' });
        sendResize();
      };

      ws.onmessage = function(event) {
        var message = JSON.parse(event.data);
        if (message.type === 'output') {
          term.write(message.data);
          return;
        }
        if (message.type === 'sessionInfo') {
          notifyRN({ type: 'sessionInfo', session: message.session });
          return;
        }
        if (message.type === 'exit') {
          notifyRN({ type: 'exit', code: message.code });
          return;
        }
        if (message.type === 'error') {
          notifyRN({ type: 'error', message: message.message });
        }
      };

      ws.onclose = function(event) {
        ws = null;

        if (event.code === 1000 || event.code === 1008) {
          writeStatusLine('接続を終了しました');
          notifyRN({ type: 'disconnected' });
          return;
        }

        scheduleReconnect();
      };

      ws.onerror = function() {
        notifyRN({ type: 'error', message: 'WebSocket error' });
      };
    }

    term.onData(function(data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data: data }));
      }
    });

    window.addEventListener('resize', function() {
      fitTerminal();
      sendResize();
    });

    function handleBridgeMessage(rawData) {
      try {
        var message = JSON.parse(rawData);
        if (message.type === 'input') {
          if (term) {
            if (!message.noFocus) {
              term.focus();
            } else {
              // noFocus時は内部textareaのfocusを外してiOSキーボード再表示を防ぐ
              var textarea = document.querySelector('.xterm-helper-textarea');
              if (textarea) {
                textarea.blur();
              }
            }
            if (typeof term.input === 'function') {
              term.input(message.data, true);
            } else {
              if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', data: message.data }));
              }
            }
          }
          return;
        }
        if (message.type === 'resize') {
          term.resize(message.cols, message.rows);
          updateKnownSize();
          sendResize();
          return;
        }
        if (message.type === 'theme') {
          applyTheme(message.theme);
        }
      } catch (_error) {}
    }

    function isTrustedOrigin(origin) {
      if (!origin || origin === 'null') return true;
      return origin === window.location.origin;
    }

    window.addEventListener('message', function(event) {
      if (!isTrustedOrigin(event.origin)) return;
      handleBridgeMessage(event.data);
    });

    document.addEventListener('message', function(event) {
      handleBridgeMessage(event.data);
    });

    document.getElementById('terminal').addEventListener('click', function() {
      if (!manualReconnectAvailable) {
        return;
      }

      resetReconnectState();
      connect();
    });

    if (document.readyState === 'complete') {
      connect();
    } else {
      window.addEventListener('load', function() { connect(); });
    }

    // ---- Touch scroll for mobile WebView ----
    var touchScrollStartY = null;
    var touchScrollLastY = null;
    var touchScrollActive = false;
    var TOUCH_SCROLL_DEAD_ZONE = 10;

    function isTouchInTerminal(touch) {
      var el = document.getElementById('terminal');
      if (!el) return false;
      var rect = el.getBoundingClientRect();
      return (
        touch.clientX >= rect.left &&
        touch.clientX <= rect.right &&
        touch.clientY >= rect.top &&
        touch.clientY <= rect.bottom
      );
    }

    document.addEventListener('touchstart', function(e) {
      if (e.touches.length !== 1) return;
      var touch = e.touches[0];
      if (!isTouchInTerminal(touch)) return;

      touchScrollStartY = touch.clientY;
      touchScrollLastY = touch.clientY;
      touchScrollActive = false;
    }, { passive: true, capture: true });

    document.addEventListener('touchmove', function(e) {
      if (e.touches.length !== 1 || touchScrollStartY === null) return;

      var touch = e.touches[0];
      var currentY = touch.clientY;

      // デッドゾーン: 最初の10px移動までは判定待ち
      if (!touchScrollActive) {
        if (Math.abs(currentY - touchScrollStartY) > TOUCH_SCROLL_DEAD_ZONE) {
          touchScrollActive = true;
          touchScrollLastY = currentY;
        }
        return;
      }

      var deltaY = touchScrollLastY - currentY;
      touchScrollLastY = currentY;

      // xterm.js の viewport に WheelEvent を dispatch
      var viewport = document.querySelector('.xterm-viewport');
      if (viewport && deltaY !== 0) {
        viewport.dispatchEvent(new WheelEvent('wheel', {
          deltaY: deltaY,
          deltaMode: 0,
          bubbles: true,
          cancelable: true
        }));
      }

      e.preventDefault();
    }, { passive: false, capture: true });

    document.addEventListener('touchend', function(e) {
      if (touchScrollStartY !== null) {
        touchScrollStartY = null;
        touchScrollLastY = null;
        touchScrollActive = false;
      }
    }, { passive: true, capture: true });

    document.addEventListener('touchcancel', function(e) {
      touchScrollStartY = null;
      touchScrollLastY = null;
      touchScrollActive = false;
    }, { passive: true, capture: true });

    // ---- Keyboard / VisualViewport resize handling ----
    if (window.visualViewport) {
      var lastVpHeight = window.visualViewport.height;

      window.visualViewport.addEventListener('resize', function() {
        var vpHeight = window.visualViewport.height;
        if (vpHeight !== lastVpHeight) {
          lastVpHeight = vpHeight;
          var terminalEl = document.getElementById('terminal');
          if (terminalEl) {
            terminalEl.style.height = vpHeight + 'px';
          }
          fitTerminal();
          sendResize();
        }
      });

      window.visualViewport.addEventListener('scroll', function() {
        window.scrollTo(0, 0);
      });
    }

    // ---- Gesture Support: Double-tap → Enter ----

    // Gesture feedback overlay
    var gestureIndicator = document.createElement('div');
    gestureIndicator.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
      'z-index:1000;pointer-events:none;padding:8px 16px;border-radius:6px;' +
      'background:rgba(0,0,0,0.65);color:#fff;font-size:16px;font-weight:600;' +
      'opacity:0;transition:opacity 0.15s ease;white-space:nowrap;';
    document.body.appendChild(gestureIndicator);

    var gestureIndicatorTimer = null;
    function showGestureIndicator(text) {
      if (gestureIndicatorTimer) clearTimeout(gestureIndicatorTimer);
      gestureIndicator.textContent = text;
      gestureIndicator.style.opacity = '1';
      gestureIndicatorTimer = setTimeout(function() {
        gestureIndicator.style.opacity = '0';
        gestureIndicatorTimer = null;
      }, 500);
    }

    // Long-press detection → Enter
    var LONG_PRESS_DURATION = 400;
    var LONG_PRESS_MOVE_LIMIT = 15;
    var longPressTimer = null;
    var longPressStartX = 0;
    var longPressStartY = 0;
    var longPressFired = false;

    function sendEnterKey() {
      if (term && typeof term.input === 'function') {
        var textarea = document.querySelector('.xterm-helper-textarea');
        if (textarea) textarea.blur();
        term.input('\r', true);
      } else if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data: '\r' }));
      }
      showGestureIndicator('Enter \u21b5');
    }

    function cancelLongPress() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    document.addEventListener('touchstart', function(e) {
      if (e.touches.length !== 1) return;
      var touch = e.touches[0];
      if (!isTouchInTerminal(touch)) return;

      longPressStartX = touch.clientX;
      longPressStartY = touch.clientY;
      longPressFired = false;

      cancelLongPress();
      longPressTimer = setTimeout(function() {
        longPressTimer = null;
        longPressFired = true;
        sendEnterKey();
      }, LONG_PRESS_DURATION);
    }, { passive: true, capture: false });

    document.addEventListener('touchmove', function(e) {
      if (!longPressTimer) return;
      if (e.touches.length !== 1) { cancelLongPress(); return; }
      var touch = e.touches[0];
      var dist = Math.sqrt(
        Math.pow(touch.clientX - longPressStartX, 2) +
        Math.pow(touch.clientY - longPressStartY, 2)
      );
      if (dist > LONG_PRESS_MOVE_LIMIT) cancelLongPress();
    }, { passive: true, capture: false });

    document.addEventListener('touchend', function() {
      cancelLongPress();
      if (longPressFired) {
        longPressFired = false;
        // 長押し後の touchend → click → focus を一時的にブロック
        var textarea = document.querySelector('.xterm-helper-textarea');
        if (textarea) {
          textarea.blur();
          var blockFocus = function() {
            textarea.blur();
            textarea.removeEventListener('focus', blockFocus);
          };
          textarea.addEventListener('focus', blockFocus);
          setTimeout(function() {
            textarea.removeEventListener('focus', blockFocus);
          }, 300);
        }
      }
    }, { passive: true, capture: false });

    document.addEventListener('touchcancel', function() {
      cancelLongPress();
    }, { passive: true, capture: false });
  </script>
</body>
</html>
